<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#6d3bf5">
<title>Manasa's NYC Guide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1c1a26; --muted:#6b6878; --line:#eceaf2;
    --brand:#6d3bf5; --brand2:#c13584; --green:#37c07a; --gold:#b8860b;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body { font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:#f6f5fb; display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

  header { flex:none; padding:10px 14px 8px; background:#fff;
    box-shadow:0 1px 6px rgba(60,40,120,.08); z-index:600; }
  .titlerow { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  h1 { font-family:'Fraunces',serif; font-size:19px; margin:0; font-weight:700;
    background:linear-gradient(120deg,var(--brand),var(--brand2));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .reset { font-size:11px; color:var(--muted); background:#f0eff5; border:none;
    padding:5px 10px; border-radius:999px; font-weight:600; cursor:pointer; }
  .dayswitch { display:flex; gap:6px; margin-top:8px; }
  .dayswitch button { flex:1; font-family:inherit; font-weight:700; font-size:13px;
    padding:8px 0; border:1.5px solid var(--line); background:#fff; color:var(--muted);
    border-radius:11px; cursor:pointer; transition:.15s; }
  .dayswitch button.active { background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(109,59,245,.3); }
  .daymeta { font-size:11.5px; color:var(--muted); margin-top:6px; display:flex;
    gap:12px; align-items:center; }
  .daymeta .sub { flex:1; }

  #next { flex:none; margin:0; padding:0; }
  #next .bar { display:flex; align-items:center; gap:10px; padding:9px 14px;
    background:linear-gradient(135deg,#eef0ff,#fbeef8); font-size:13px; }
  #next .bar b { color:var(--brand); }
  #next button { font-family:inherit; font-weight:700; font-size:12px; border:none;
    background:var(--brand); color:#fff; padding:7px 12px; border-radius:999px; cursor:pointer; }
  #next .dist { color:var(--muted); font-size:12px; }

  #map { flex:1 1 40%; min-height:180px; z-index:1; }

  #timeline { flex:1 1 60%; overflow-y:auto; background:#f6f5fb;
    -webkit-overflow-scrolling:touch; padding:6px 12px 40px; }
  .stop { background:#fff; border-radius:14px; padding:11px 12px; margin:9px 0;
    box-shadow:0 2px 8px rgba(60,40,120,.06); border:1.5px solid transparent; transition:.15s; }
  .stop.sel { border-color:var(--brand); box-shadow:0 4px 16px rgba(109,59,245,.18); }
  .stop.done { opacity:.62; }
  .stop.skipped { opacity:.5; }
  .stop.done .name, .stop.skipped .name { text-decoration:line-through; }
  .srow { display:flex; gap:10px; align-items:flex-start; }
  .snum { flex:none; width:26px; height:26px; border-radius:50%; background:#fff;
    border:2px solid var(--brand); color:var(--brand); font-weight:700; font-size:12px;
    display:grid; place-items:center; margin-top:1px; }
  .stop.done .snum { background:var(--green); border-color:var(--green); color:#fff; }
  .stop.skipped .snum { background:#bbb; border-color:#bbb; color:#fff; }
  .sbody { flex:1; min-width:0; }
  .time { font-size:12px; font-weight:700; color:var(--brand); font-variant-numeric:tabular-nums; }
  .leg { font-size:11px; color:var(--muted); margin-bottom:2px; }
  .name { font-weight:700; font-size:15px; }
  .note { font-size:12.5px; color:#54515f; margin-top:3px; }
  .links { margin-top:7px; display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  a.chip, .acts button { font-size:11.5px; text-decoration:none; padding:4px 10px;
    border-radius:999px; font-weight:600; border:none; cursor:pointer; font-family:inherit; }
  a.map { background:#eef4ff; color:#1a5fd0; }
  a.reel { background:#ffeef6; color:var(--brand2); }
  .acts { margin-top:8px; display:flex; gap:7px; }
  .acts button.done { background:#e7f8ee; color:#1c8a4e; }
  .acts button.skip { background:#f2f2f5; color:#777; }
  .acts button.active-done { background:var(--green); color:#fff; }
  .acts button.active-skip { background:#999; color:#fff; }
  .optwrap { margin-top:9px; padding-left:10px; border-left:3px solid var(--green); }
  .opt { margin:7px 0; }
  .opt .name { font-size:13.5px; }
  .opt .oflag { color:var(--green); font-weight:700; }
  .opt .note { font-size:11.5px; }
  details.costs { margin:10px 0 4px; background:#fff; border-radius:12px; padding:2px 12px;
    box-shadow:0 2px 8px rgba(60,40,120,.06); }
  details.costs summary { cursor:pointer; font-weight:700; font-size:13px; padding:10px 0;
    list-style:none; color:#4a4756; }
  details.costs summary::-webkit-details-marker { display:none; }
  details.costs summary:before { content:"\25B8 "; color:var(--brand); }
  details.costs[open] summary:before { content:"\25BE "; }
  details.costs table { width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:8px; }
  details.costs td { padding:5px 0; border-bottom:1px solid #eee; }
  details.costs td:last-child { text-align:right; white-space:nowrap; padding-left:12px; }
  details.costs tr.total td { font-weight:700; border-top:2px solid #ddd; border-bottom:none;
    color:var(--brand); }

  .leaflet-marker-icon.numicon { background:transparent; border:none; }
  .pin { width:28px; height:28px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
    display:grid; place-items:center; box-shadow:0 2px 6px rgba(0,0,0,.35);
    border:2px solid #fff; }
  .pin span { transform:rotate(45deg); color:#fff; font-weight:700; font-size:12px; }
  .pin.main { background:var(--brand); }
  .pin.optional { width:20px; height:20px; background:var(--green); }
  .pin.optional span { font-size:10px; }
  .pin.done { background:var(--green); }
  .pin.skipped { background:#aaa; }
  .pin.sel { outline:3px solid #ffd24d; outline-offset:1px; }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>🗽 Manasa's NYC Guide</h1>
    <button class="reset" id="resetBtn">Reset ticks</button>
  </div>
  <div class="dayswitch" id="dayswitch"></div>
  <div class="daymeta"><span class="sub" id="daysub"></span>
    <span id="dayend"></span><span id="daykm"></span></div>
</header>
<div id="next"><div class="bar">
  <button id="nextBtn">📍 Next stop</button>
  <span id="nextText" class="dist">Tap to find your nearest un-done stop</span>
</div></div>
<div id="map"></div>
<div id="timeline"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
